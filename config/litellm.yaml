model_list:
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: gpt-3.5-turbo
      api_key: "os.environ/OPENAI_API_KEY"

  - model_name: ollama/*
    litellm_params:
      model: ollama/*
      api_base: "http://localhost:11434"

  - model_name: gemini/*
    litellm_params:
      model: gemini/*
      api_key: "os.environ/GEMINI_API_KEY"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
  drop_params: True
