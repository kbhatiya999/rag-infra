[tools]
dotenvx = "latest"
overmind = "latest"
python = "3.11"

[tasks.dev]
description = "Start all services via overmind"
run = "dotenvx run -- overmind start"

[tasks.encrypt]
description = "Encrypt key secrets in .env"
run = "dotenvx encrypt -k GEMINI_API_KEY -k LITELLM_MASTER_KEY -k JUPYTER_TOKEN"

[tasks.set]
description = "Set a secret value"
run = "dotenvx set $KEY $VALUE"

[tasks.secrets-check]
description = "Verify decrypted secrets"
run = "dotenvx run -- env | grep -E 'GEMINI_API|LITELLM_MASTER|JUPYTER_TOKEN'"

[tasks.rotate]
description = "Rotate encrypted secrets"
run = "dotenvx rotate"

[tasks.init]
description = "Initialize data directories"
run = "mkdir -p data/litellm data/ollama data/jupyter"
